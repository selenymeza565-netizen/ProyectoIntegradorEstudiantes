<section id="servicios">

    <div class="opcionesPortal">
        <div class="opcion" onclick="mostrar('notas')">Notas</div>

<!-- Formularios -->
<div id="notas" style="display:none;">
    <h3>Entrar a mirar notas</h3>
    <form>
        Nombre: <input type="text"><br>
         Apellido: <input type="text"><br>
        Documento: <input type="text"><br>
        <button type="submit">VER</button>
    </form>
</div>

<div id="asistencia" style="display:none;">
    <h3>Verificar asistencia</h3>
    <form>
        Nombre: <input type="text"><br>
         Apellido: <input type="text"><br>
        Documento: <input type="text"><br>
        <button type="submit">VER</button>
    </form>
</div>

<script>
function mostrar(seccion) {
    document.getElementById("notas").style.display = "none";
    document.getElementById("asistencia").style.display = "none";
    document.getElementById(seccion).style.display = "block";
}
</script>
